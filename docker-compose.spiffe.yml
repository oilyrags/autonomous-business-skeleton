# Overlay for the SPIFFE-secured topology: route the agent's gateway calls through
# its mTLS sidecar instead of plaintext to the gateway. Use with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.spiffe.yml --profile spiffe up -d
services:
  agent:
    environment:
      AB_GATEWAY_URL: http://agent-proxy:8000
    depends_on:
      agent-proxy:
        condition: service_started
