agent {
    data_dir           = "/opt/spire/data"
    log_level          = "WARN"
    trust_domain       = "ab.internal"
    server_address     = "spire-server"
    server_port        = "8081"
    socket_path        = "/opt/spire/sockets/agent.sock"
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }
    KeyManager "memory" {
        plugin_data {}
    }
    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
