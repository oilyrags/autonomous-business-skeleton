asyncapi: 3.0.0
info:
  title: Autonomous AI-First Business — Event Backbone
  version: 1.0.0
  description: >
    Domain-event contracts for the autonomous business skeleton. Transport is a
    Kafka-compatible log (Kafka/Redpanda). Delivery is at-least-once; consumers
    are idempotent by `eventId`. Every message uses the common envelope and
    carries a data classification. Personal-data and financial messages carry
    additional governance fields. See 04_event_catalog.md for the human index.
  contact:
    name: Chief Architect Agent
  tags:
    - name: personal
      description: Carries personal data; subject to GDPR + DSAR propagation.
    - name: financial
      description: Affects or references the ledger / money movement.

defaultContentType: application/json

servers:
  production:
    host: kafka.internal:9092
    protocol: kafka
    description: Primary event log (Redpanda). Topics are partitioned by subjectRef.id.
    security:
      - $ref: '#/components/securitySchemes/mtls'

channels:
  consentGranted:
    address: crm.consent.granted
    messages:
      ConsentGranted:
        $ref: '#/components/messages/ConsentGranted'
  consentRevoked:
    address: crm.consent.revoked
    messages:
      ConsentRevoked:
        $ref: '#/components/messages/ConsentRevoked'
  invoiceIssued:
    address: finance.invoice.issued
    messages:
      InvoiceIssued:
        $ref: '#/components/messages/InvoiceIssued'
  paymentReceived:
    address: finance.payment.received
    messages:
      PaymentReceived:
        $ref: '#/components/messages/PaymentReceived'
  dsarReceived:
    address: compliance.dsar.received
    messages:
      DataSubjectRequestReceived:
        $ref: '#/components/messages/DataSubjectRequestReceived'
  dataDeletionCompleted:
    address: compliance.dsar.deletion_completed
    messages:
      DataDeletionCompleted:
        $ref: '#/components/messages/DataDeletionCompleted'
  agentDecisionMade:
    address: executive.decision.made
    messages:
      AgentDecisionMade:
        $ref: '#/components/messages/AgentDecisionMade'
  approvalRequired:
    address: workflow.approval.required
    messages:
      ApprovalRequired:
        $ref: '#/components/messages/ApprovalRequired'
  killSwitchActivated:
    address: security.killswitch.activated
    messages:
      KillSwitchActivated:
        $ref: '#/components/messages/KillSwitchActivated'
  ledgerEntryPosted:
    address: finance.ledger.entry_posted
    messages:
      LedgerEntryPosted:
        $ref: '#/components/messages/LedgerEntryPosted'
  revenueReceived:
    address: finance.revenue.received
    messages:
      RevenueReceived:
        $ref: '#/components/messages/RevenueReceived'
  adSpendPlaced:
    address: growth.ads.spend_placed
    messages:
      AdSpendPlaced:
        $ref: '#/components/messages/AdSpendPlaced'
  mvpDeployed:
    address: growth.mvp.deployed
    messages:
      MvpDeployed:
        $ref: '#/components/messages/MvpDeployed'
  saleClosed:
    address: sales.opportunity.closed
    messages:
      SaleClosed:
        $ref: '#/components/messages/SaleClosed'
  contentPublished:
    address: marketing.content.published
    messages:
      ContentPublished:
        $ref: '#/components/messages/ContentPublished'
  postMetricsCollected:
    address: marketing.content.metrics_collected
    messages:
      PostMetricsCollected:
        $ref: '#/components/messages/PostMetricsCollected'
  experimentCreated:
    address: growth.experiment.created
    messages:
      ExperimentCreated:
        $ref: '#/components/messages/ExperimentCreated'
  experimentConcluded:
    address: growth.experiment.concluded
    messages:
      ExperimentConcluded:
        $ref: '#/components/messages/ExperimentConcluded'
  businessActivated:
    address: executive.business.activated
    messages:
      BusinessActivated:
        $ref: '#/components/messages/BusinessActivated'
  capitalReallocationRecommended:
    address: executive.portfolio.reallocation_recommended
    messages:
      CapitalReallocationRecommended:
        $ref: '#/components/messages/CapitalReallocationRecommended'
  modelPromoted:
    address: mlops.model.promoted
    messages:
      ModelPromoted:
        $ref: '#/components/messages/ModelPromoted'
  modelEvaluationFailed:
    address: mlops.model.evaluation_failed
    messages:
      ModelEvaluationFailed:
        $ref: '#/components/messages/ModelEvaluationFailed'

operations:
  publishConsentGranted:
    action: send
    channel:
      $ref: '#/channels/consentGranted'
  onConsentRevoked:
    action: receive
    channel:
      $ref: '#/channels/consentRevoked'
  publishInvoiceIssued:
    action: send
    channel:
      $ref: '#/channels/invoiceIssued'
  onDsarReceived:
    action: receive
    channel:
      $ref: '#/channels/dsarReceived'
  publishKillSwitch:
    action: send
    channel:
      $ref: '#/channels/killSwitchActivated'
  publishLedgerEntryPosted:
    action: send
    channel:
      $ref: '#/channels/ledgerEntryPosted'
  publishRevenueReceived:
    action: send
    channel:
      $ref: '#/channels/revenueReceived'
  publishAdSpendPlaced:
    action: send
    channel:
      $ref: '#/channels/adSpendPlaced'
  publishMvpDeployed:
    action: send
    channel:
      $ref: '#/channels/mvpDeployed'
  publishSaleClosed:
    action: send
    channel:
      $ref: '#/channels/saleClosed'
  publishContentPublished:
    action: send
    channel:
      $ref: '#/channels/contentPublished'
  publishPostMetricsCollected:
    action: send
    channel:
      $ref: '#/channels/postMetricsCollected'
  publishExperimentCreated:
    action: send
    channel:
      $ref: '#/channels/experimentCreated'
  publishExperimentConcluded:
    action: send
    channel:
      $ref: '#/channels/experimentConcluded'
  publishBusinessActivated:
    action: send
    channel:
      $ref: '#/channels/businessActivated'
  publishCapitalReallocationRecommended:
    action: send
    channel:
      $ref: '#/channels/capitalReallocationRecommended'
  publishModelPromoted:
    action: send
    channel:
      $ref: '#/channels/modelPromoted'
  publishModelEvaluationFailed:
    action: send
    channel:
      $ref: '#/channels/modelEvaluationFailed'

components:
  securitySchemes:
    mtls:
      type: X509
      description: Mutual TLS; producer/consumer principals issued by Security context.

  schemas:
    Envelope:
      type: object
      required: [eventName, eventId, occurredAt, producer, schemaVersion, dataClassification, subjectRef]
      properties:
        eventName: { type: string }
        eventId: { type: string, format: uuid }
        occurredAt: { type: string, format: date-time }
        producer: { type: string, description: "context.aggregate id, e.g. finance.billing" }
        traceId: { type: string, description: OpenTelemetry trace id }
        schemaVersion: { type: string, default: "1.0.0" }
        dataClassification:
          type: string
          enum: [public, internal, confidential, personal, financial]
        subjectRef:
          type: object
          required: [type, id]
          properties:
            type: { type: string, enum: [Customer, Contact, Account, Invoice, Ticket, Decision, Vendor, Worker, System, Business, Experiment, LedgerTransaction, Model, Charge] }
            id: { type: string }

    PersonalDataGovernance:
      type: object
      description: Required block for any message classified `personal`.
      required: [lawfulBasis, dsarImpact, retentionPolicy]
      properties:
        lawfulBasis:
          type: string
          enum: [consent, contract, legitimate_interest, legal_obligation, vital_interest, public_task]
        dsarImpact:
          type: array
          items: { type: string, enum: [access, erasure, portability, rectification, objection, restriction] }
        retentionPolicy: { type: string }

    FinancialGovernance:
      type: object
      description: Required block for any message classified `financial`.
      required: [ledgerImpact]
      properties:
        ledgerImpact:
          type: string
          description: Description of debit/credit effect, or "none".
        idempotencyKey: { type: string }

  messages:
    ConsentGranted:
      name: ConsentGranted
      title: Consent granted
      tags: [{ name: personal }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - $ref: '#/components/schemas/PersonalDataGovernance'
          - type: object
            required: [contactId, purpose, channel, grantedAt]
            properties:
              contactId: { type: string }
              purpose: { type: string }
              channel: { type: string, enum: [email, sms, phone, postal, product] }
              grantedAt: { type: string, format: date-time }
      examples:
        - name: marketingEmailConsent
          payload:
            eventName: ConsentGranted
            eventId: "3f1c...uuid"
            occurredAt: "2026-06-30T10:00:00Z"
            producer: crm.marketing
            schemaVersion: "1.0.0"
            dataClassification: personal
            subjectRef: { type: Contact, id: "contact_123" }
            lawfulBasis: consent
            dsarImpact: [access, portability]
            retentionPolicy: consent_retention
            contactId: "contact_123"
            purpose: "Lifecycle email communication"
            channel: email
            grantedAt: "2026-06-30T10:00:00Z"

    ConsentRevoked:
      name: ConsentRevoked
      title: Consent revoked
      tags: [{ name: personal }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - $ref: '#/components/schemas/PersonalDataGovernance'
          - type: object
            required: [contactId, purpose, channel, revokedAt]
            properties:
              contactId: { type: string }
              purpose: { type: string }
              channel: { type: string }
              revokedAt: { type: string, format: date-time }

    InvoiceIssued:
      name: InvoiceIssued
      title: Invoice issued
      tags: [{ name: financial }, { name: personal }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - $ref: '#/components/schemas/FinancialGovernance'
          - type: object
            required: [invoiceId, accountId, amount, currency, dueDate, lineItems]
            properties:
              invoiceId: { type: string }
              accountId: { type: string }
              amount: { type: number }
              currency: { type: string, default: EUR }
              dueDate: { type: string, format: date }
              lineItems:
                type: array
                items:
                  type: object
                  properties:
                    sku: { type: string }
                    qty: { type: integer }
                    unitPrice: { type: number }

    PaymentReceived:
      name: PaymentReceived
      title: Payment received
      tags: [{ name: financial }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - $ref: '#/components/schemas/FinancialGovernance'
          - type: object
            required: [paymentId, invoiceId, amount, currency, receivedAt]
            properties:
              paymentId: { type: string }
              invoiceId: { type: string }
              amount: { type: number }
              currency: { type: string }
              receivedAt: { type: string, format: date-time }

    DataSubjectRequestReceived:
      name: DataSubjectRequestReceived
      title: DSAR received
      tags: [{ name: personal }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - $ref: '#/components/schemas/PersonalDataGovernance'
          - type: object
            required: [dsarId, rightRequested, subjectId, receivedAt, dueBy]
            properties:
              dsarId: { type: string }
              rightRequested:
                type: string
                enum: [access, erasure, portability, rectification, objection, restriction]
              subjectId: { type: string }
              receivedAt: { type: string, format: date-time }
              dueBy: { type: string, format: date, description: "Statutory deadline, e.g. +30 days" }

    DataDeletionCompleted:
      name: DataDeletionCompleted
      title: Data deletion completed
      tags: [{ name: personal }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - $ref: '#/components/schemas/PersonalDataGovernance'
          - type: object
            required: [dsarId, subjectId, contextsConfirmed, completedAt]
            properties:
              dsarId: { type: string }
              subjectId: { type: string }
              contextsConfirmed:
                type: array
                items: { type: string }
                description: Every personal-data context that confirmed erasure/anonymization.
              legalHoldExclusions:
                type: array
                items: { type: string }
                description: Data retained under legal hold, with hold reference.
              completedAt: { type: string, format: date-time }

    AgentDecisionMade:
      name: AgentDecisionMade
      title: Agent decision made
      tags: [{ name: confidential }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [decisionId, agentId, authorityLevel, approvalStatus]
            properties:
              decisionId: { type: string }
              agentId: { type: string }
              authorityLevel: { type: integer, minimum: 0, maximum: 5 }
              approvalStatus:
                type: string
                enum: [approved, rejected, pending, autonomous_within_policy]
              art22Significant: { type: boolean, default: false }
              businessId: { type: string, description: Business the decision is scoped to, if any. }

    ApprovalRequired:
      name: ApprovalRequired
      title: Approval required
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [approvalId, action, requestedBy, approverRole, authorityMatrixRef]
            properties:
              approvalId: { type: string }
              action: { type: string }
              requestedBy: { type: string }
              approverRole: { type: string }
              authorityMatrixRef: { type: string, description: "Row id in 06_autonomy_authority_matrix" }
              context: { type: object, description: Full decision context for the approver. }

    KillSwitchActivated:
      name: KillSwitchActivated
      title: Kill switch activated
      tags: [{ name: confidential }]
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [scope, reason, activatedBy, activatedAt]
            properties:
              scope: { type: string, enum: [global, context, agent], description: Blast radius. }
              targetId: { type: string, description: agentId/context if not global. }
              reason: { type: string }
              activatedBy: { type: string }
              activatedAt: { type: string, format: date-time }

    LedgerEntryPosted:
      name: LedgerEntryPosted
      title: Ledger entry posted
      tags: [{ name: financial }]
      description: >
        Emitted once per applied ledger transaction (never on an idempotent replay). Consumers
        integrate downstream (analytics, reconciliation) without reading the ledger's private store.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [txnId, idempotencyKey, amountMinor, currency, payee, maker]
            properties:
              txnId: { type: string }
              idempotencyKey: { type: string }
              amountMinor: { type: integer, description: Money moved, in integer minor units. }
              currency: { type: string, default: EUR }
              payee: { type: string }
              maker: { type: string }
              checker: { type: string, description: Distinct approver for maker-checker payments. }
              businessId: { type: string, description: Business the payment is scoped to, if any. }

    PostMetricsCollected:
      name: PostMetricsCollected
      title: Post metrics collected
      description: >
        A published post's engagement metrics were collected and scored into a single KPI-weighted
        composite (basis points). Published by the Social context; feeds the growth experiment loop.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, platformPostId, impressions, compositeScoreBps]
            properties:
              businessId: { type: string }
              platformPostId: { type: string }
              impressions: { type: integer }
              compositeScoreBps: { type: integer, description: KPI-weighted composite score (bps). }

    ContentPublished:
      name: ContentPublished
      title: Content published
      description: >
        A social post passed QA and was published to a platform. Business-scoped so content is
        attributable and can become an experiment variant. Published by the Social context.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, platform, platformPostId, format, pillar]
            properties:
              businessId: { type: string }
              platform: { type: string }
              platformPostId: { type: string }
              format: { type: string }
              pillar: { type: string }

    SaleClosed:
      name: SaleClosed
      title: Sale closed
      tags: [{ name: financial }]
      description: >
        A sales opportunity reached a terminal stage (won or lost). A won sale drives a customer
        charge into the Revenue context. Published by Sales & Revenue Ops.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, opportunityId, stage, amountMinor, reason]
            properties:
              businessId: { type: string }
              opportunityId: { type: string }
              stage: { type: string, enum: [won, lost] }
              amountMinor: { type: integer, description: Contract value, in integer minor units. }
              reason: { type: string }

    MvpDeployed:
      name: MvpDeployed
      title: MVP deployed
      description: >
        A business's MVP/landing page was generated from its Blueprint and deployed to a URL, so an
        experiment can point traffic at it. Published by the MVP context.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, url, contentHash]
            properties:
              businessId: { type: string }
              url: { type: string }
              contentHash: { type: string, description: Hash of the deployed page content. }

    AdSpendPlaced:
      name: AdSpendPlaced
      title: Ad spend placed
      tags: [{ name: financial }]
      description: >
        A business-scoped ad campaign ran: spend placed with a platform + attributed conversions.
        Closes the acquisition loop so CAC = spend / conversions on real numbers.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, channel, spendMinor, conversions, externalRef]
            properties:
              businessId: { type: string }
              channel: { type: string }
              spendMinor: { type: integer, description: Ad spend placed, in integer minor units. }
              conversions: { type: integer, description: Attributed conversions (new customers). }
              externalRef: { type: string }

    RevenueReceived:
      name: RevenueReceived
      title: Revenue received
      tags: [{ name: financial }]
      description: >
        Money received from a customer and booked to the ledger. Business-scoped so income is
        attributable per business. Published by the Revenue context; `externalRef` is the rail's
        charge id (idempotency anchor).
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, externalRef, amountMinor, currency, customerRef]
            properties:
              businessId: { type: string }
              externalRef: { type: string }
              amountMinor: { type: integer, description: Money received, in integer minor units. }
              currency: { type: string, default: EUR }
              customerRef: { type: string }

    ExperimentCreated:
      name: ExperimentCreated
      title: Experiment created
      description: >
        A governed experiment proposal was created (PRD 0007). Emitted by the Experimentation &
        Growth context when `growth.experiment.create` persists a proposal; `businessId` scopes it
        (multi-tenancy). The budget is a spend cap, not a cash movement.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, experimentId, hypothesis, armNames, budgetMinor]
            properties:
              businessId: { type: string }
              experimentId: { type: string }
              hypothesis: { type: string }
              armNames: { type: array, items: { type: string } }
              budgetMinor: { type: integer, description: Budget cap in integer minor units. }
              status: { type: string, enum: [proposed, running, concluded], default: proposed }

    ExperimentConcluded:
      name: ExperimentConcluded
      title: Experiment concluded
      description: >
        The Experimentation & Growth context's decision on an experiment. `businessId` scopes it to
        one business in the portfolio (multi-tenancy).
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, experimentId, action, reason, pValue, controlRate, variantRate]
            properties:
              businessId: { type: string }
              experimentId: { type: string }
              action: { type: string, enum: [scale, pivot, kill, continue] }
              reason: { type: string }
              pValue: { type: number }
              controlRate: { type: number }
              variantRate: { type: number }

    BusinessActivated:
      name: BusinessActivated
      title: Business activated
      description: >
        A new business passed the readiness gate and went live, funded with capital. The Business
        Factory's published event; a portfolio context integrates on `businessId`.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, name, capitalMinor]
            properties:
              businessId: { type: string }
              name: { type: string }
              capitalMinor: { type: integer, description: Capital funded, in integer minor units. }

    CapitalReallocationRecommended:
      name: CapitalReallocationRecommended
      title: Capital reallocation recommended
      tags: [{ name: financial }]
      description: >
        The Portfolio context recommends a capital action for a business. Advisory only — capital
        moves are human-in-the-loop (no autonomous execution for money).
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [businessId, action, capitalDelta, reason]
            properties:
              businessId: { type: string }
              action: { type: string, enum: [invest_more, hold, starve, sunset] }
              capitalDelta: { type: integer, description: Recommended change to deployed capital (minor units). }
              reason: { type: string }

    ModelPromoted:
      name: ModelPromoted
      title: Model promoted
      description: A model version passed its eval gate and may serve the task profile.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [taskProfile, modelVersion, evalScore]
            properties:
              taskProfile: { type: string }
              modelVersion: { type: string }
              evalScore: { type: number }
              art22Significant: { type: boolean, default: false }

    ModelEvaluationFailed:
      name: ModelEvaluationFailed
      title: Model evaluation failed
      description: A model version failed its eval gate and is blocked from serving.
      payload:
        allOf:
          - $ref: '#/components/schemas/Envelope'
          - type: object
            required: [taskProfile, modelVersion, evalScore, failedCases, reason]
            properties:
              taskProfile: { type: string }
              modelVersion: { type: string }
              evalScore: { type: number }
              failedCases: { type: array, items: { type: string } }
              reason: { type: string }
