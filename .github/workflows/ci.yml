name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --frozen
      - name: Lint
        run: |
          uv run ruff check src
          uv run ruff format --check src
      - name: Typecheck
        run: uv run mypy
      - name: Model eval gate (blocks a model that fails its eval set)
        run: make eval
      - name: Ledger invariants (balance, double-payment, maker-checker)
        run: make ledger
      - name: Compliance gate (personal data has a lawful basis + 08 RoPA record)
        run: make compliance
      - name: Failure-injection suite (Audit 12 — controls contain injected failures)
        run: make failsim
      - name: Growth engine (experiment scale/pivot/kill decisions)
        run: make growth
      - name: Business factory (provision + readiness gate)
        run: make factory
      - name: Portfolio allocation (capital recycle recommendations)
        run: make portfolio
      - name: Unit economics (profit/CAC/margin/LLM-cost per business)
        run: make econ
      - name: LLM budget enforcement (gateway denies over-budget calls)
        run: make llm-budget
      - name: End-to-end loop (ledger spend -> econ verdict -> portfolio)
        run: make loop
      - name: Revenue rail (customer charges booked as income)
        run: make revenue
      - name: Paid acquisition (ad spend + attribution)
        run: make ads
      - name: MVP generator + deployer (Blueprint -> page -> URL)
        run: make mvp
      - name: Sales pipeline (qualify -> close -> revenue)
        run: make sales
      - name: Observability (fleet overview + anomaly detection)
        run: make obs
      - name: Living playbooks (distil winners -> reusable blueprint)
        run: make playbook
      - name: Per-business memory (scoped recall isolation)
        run: make memory
      - name: Hierarchical org (authority routing + escalation)
        run: make org
      - name: Start infra (OPA + Redpanda + Postgres + Keycloak + Vault)
        run: docker compose up -d --wait opa redpanda postgres keycloak vault
      - name: Seed Vault
        run: |
          docker compose exec -T vault vault kv put secret/ab/clients \
            executive.cmo_agent=cmo-secret executive.intern_agent=intern-secret
      - name: Wait for Keycloak realm
        run: |
          for i in $(seq 1 90); do
            curl -fsS http://localhost:18083/realms/ab/protocol/openid-connect/certs >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "Keycloak realm not ready" && exit 1
      - name: Test
        run: uv run pytest
      - name: Stop infra
        if: always()
        run: docker compose down -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the secure-by-default stack (mTLS mesh)
        run: make up
      - name: Smoke test (containerized end-to-end, over mTLS)
        run: |
          set -euo pipefail
          resp=$(curl -fsS -X POST http://localhost:18090/act)
          echo "$resp"
          echo "$resp" | python3 -c "import sys, json; d = json.load(sys.stdin); assert d['gateway_status'] == 200, d; assert d['body']['status'] == 'ok', d"
          curl -fsS http://localhost:18081/audit/verify \
            | python3 -c "import sys, json; assert json.load(sys.stdin)['intact'] is True"
          echo "smoke OK"
      - name: Verify SPIFFE mTLS (all hops + DB clients; Postgres isolated)
        run: |
          ./scripts/spire-mtls-verify.sh
          ./scripts/spire-secure-verify.sh
      - name: Verify bus mTLS (gateway produce + audit/data consume over mTLS)
        run: ./scripts/spire-bus-verify.sh
      - name: Verify data service (canonical KPIs from live bus events)
        run: ./scripts/data-verify.sh
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.spiffe.yml --profile spiffe logs --tail=200
      - name: Tear down
        if: always()
        run: make down

  spiffe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap SPIRE (build + register + start agent)
        run: ./scripts/spire-bootstrap.sh
      - name: Verify SVID issuance + agent<->gateway mTLS handshake
        run: ./scripts/spire-verify.sh
      - name: Dump SPIRE logs on failure
        if: failure()
        run: docker compose --profile spiffe logs --tail=100
      - name: Tear down
        if: always()
        run: docker compose --profile spiffe down -v
