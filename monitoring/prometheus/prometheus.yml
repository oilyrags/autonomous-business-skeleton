# Prometheus for the monitoring profile (M5, ADR-0055). Scrapes the console's /metrics — the pure
# exposition of the same deterministic checks + business reads Nagios consumes. GitOps: this file
# and rules/ are version-controlled; no clicking around.
global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: console
    static_configs:
      - targets: ["host.docker.internal:8600"]  # ab_console /metrics (make console-serve)
