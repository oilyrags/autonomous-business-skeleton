# Local walking-skeleton stack. Infra (OPA, Redpanda, Postgres) is real and
# health-checked; the five service entries are placeholders for slice 00 and are
# replaced with real apps as slices 01-04 land.
name: ab-skeleton

services:
  opa:
    image: openpolicyagent/opa:1.18.1
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policy"]
    ports: ["8181:8181"]
    volumes:
      - ./config/opa:/policy:ro
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      # Listeners: internal (in-container plaintext), external (host clients), and mtls
      # (the SPIFFE path). The mtls listener advertises `kafka-mtls:29092` — the address
      # of the client-side ghostunnel — so that after the metadata exchange clients redial
      # back through the mTLS tunnel instead of connecting to the broker directly. That
      # advertised-listener redirect is the crux of doing Kafka mTLS via a TCP proxy.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092,mtls://0.0.0.0:29093
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092,mtls://kafka-mtls:29092
    ports: ["19092:19092"]
    # On `busnet` only — app services have no direct route to the broker; they reach it
    # via mTLS through redpanda-proxy (which bridges default<->busnet). The host keeps a
    # route via the published external listener (localhost:19092) for in-process tests.
    networks: [busnet]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ab
      POSTGRES_PASSWORD: ab
      POSTGRES_DB: ab
    # Host port 55432 to avoid clashing with a developer's local Postgres on 5432.
    # On `pgnet` only — app services have no direct route; they reach it via mTLS through
    # postgres-proxy. The published port stays for the host-run in-process test suite.
    ports: ["55432:5432"]
    networks: [pgnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ab -d ab"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:1.18
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: root
    command: ["server", "-dev"]
    ports: ["18200:8200"]
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10

  spire-server:
    profiles: ["spiffe"]
    build: &spire_build
      context: .
      dockerfile: Dockerfile.spire
    image: ab-spire
    command: ["spire-server", "run", "-config", "/run/spire/server.conf"]
    volumes:
      - ./config/spire/server.conf:/run/spire/server.conf:ro
      - spire-sockets:/opt/spire/sockets
    healthcheck:
      test: ["CMD", "spire-server", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Started by `make spire-up` after the join token is written (not in --wait).
  spire-agent:
    profiles: ["spiffe"]
    build: *spire_build
    image: ab-spire
    entrypoint: ["/bin/sh", "-c"]
    command: ['exec spire-agent run -config /run/spire/agent.conf -joinToken "$(cat /opt/spire/sockets/jointoken)"']
    volumes:
      - ./config/spire/agent.conf:/run/spire/agent.conf:ro
      - spire-sockets:/opt/spire/sockets
    depends_on:
      spire-server: {condition: service_healthy}

  # mTLS sidecars (ghostunnel). gateway-proxy fronts the gateway and only accepts the
  # agent SVID; agent-proxy fronts the agent and only trusts the gateway SVID. Each
  # runs as the UID SPIRE attests to the matching workload identity.
  gateway-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1002:1002"
    # Share the SPIRE agent's PID namespace so its peertracker can resolve this
    # workload's /proc for unix (uid) attestation across containers.
    pid: "service:spire-agent"
    command:
      - server
      - --listen=0.0.0.0:8443
      - --target=gateway:8000
      - --unsafe-target        # plaintext hop to the gateway is container-internal
      - --allow-uri=spiffe://ab.internal/agent
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    ports: ["18443:8443"]
    depends_on:
      gateway: {condition: service_healthy}
      spire-agent: {condition: service_started}

  agent-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1001:1001"
    pid: "service:spire-agent"  # see gateway-proxy
    command:
      - client
      - --listen=0.0.0.0:8000
      - --unsafe-listen        # plaintext listener reached over the container network
      - --target=gateway-proxy:8443
      - --verify-uri=spiffe://ab.internal/gateway
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    ports: ["18091:8000"]
    depends_on:
      gateway-proxy: {condition: service_started}
      spire-agent: {condition: service_started}

  # gateway->OPA hop over mTLS (same pattern as agent->gateway). opa-proxy fronts OPA
  # and only accepts the gateway SVID; gateway-opa-proxy is the gateway's client side.
  opa-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1003:1003"
    pid: "service:spire-agent"
    command:
      - server
      - --listen=0.0.0.0:9181
      - --target=opa:8181
      - --unsafe-target
      - --allow-uri=spiffe://ab.internal/gateway
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    ports: ["19181:9181"]
    depends_on:
      opa: {condition: service_healthy}
      spire-agent: {condition: service_started}

  gateway-opa-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1002:1002"          # gateway identity (outbound client)
    pid: "service:spire-agent"
    command:
      - client
      - --listen=0.0.0.0:8181
      - --unsafe-listen
      - --target=opa-proxy:9181
      - --verify-uri=spiffe://ab.internal/opa
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    depends_on:
      opa-proxy: {condition: service_started}
      spire-agent: {condition: service_started}

  # gateway->Postgres hop over mTLS (ghostunnel tunnels the Postgres TCP wire). Demonstrates
  # the sidecar pattern on a stateful protocol. postgres-proxy fronts Postgres and only
  # accepts the gateway SVID; gateway-pg-proxy is the gateway's client side.
  postgres-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1004:1004"
    pid: "service:spire-agent"
    command:
      - server
      - --listen=0.0.0.0:6432
      - --target=postgres:5432
      - --unsafe-target
      - --allow-uri=spiffe://ab.internal/gateway
      - --allow-uri=spiffe://ab.internal/audit
      - --allow-uri=spiffe://ab.internal/killswitch
      - --allow-uri=spiffe://ab.internal/identity
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    ports: ["16432:6432"]
    networks: [default, pgnet]   # bridges the app network to the isolated pgnet
    depends_on:
      postgres: {condition: service_healthy}
      spire-agent: {condition: service_started}

  audit-pg-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1005:1005"          # audit identity
    pid: "service:spire-agent"
    command:
      - client
      - --listen=0.0.0.0:5432
      - --unsafe-listen
      - --target=postgres-proxy:6432
      - --verify-uri=spiffe://ab.internal/postgres
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    depends_on:
      postgres-proxy: {condition: service_started}
      spire-agent: {condition: service_started}

  killswitch-pg-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1006:1006"          # killswitch identity
    pid: "service:spire-agent"
    command:
      - client
      - --listen=0.0.0.0:5432
      - --unsafe-listen
      - --target=postgres-proxy:6432
      - --verify-uri=spiffe://ab.internal/postgres
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    depends_on:
      postgres-proxy: {condition: service_started}
      spire-agent: {condition: service_started}

  gateway-pg-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1002:1002"          # gateway identity (outbound client)
    pid: "service:spire-agent"
    command:
      - client
      - --listen=0.0.0.0:5432
      - --unsafe-listen
      - --target=postgres-proxy:6432
      - --verify-uri=spiffe://ab.internal/postgres
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    depends_on:
      postgres-proxy: {condition: service_started}
      spire-agent: {condition: service_started}

  identity-pg-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1007:1007"          # identity workload
    pid: "service:spire-agent"
    command:
      - client
      - --listen=0.0.0.0:5432
      - --unsafe-listen
      - --target=postgres-proxy:6432
      - --verify-uri=spiffe://ab.internal/postgres
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    depends_on:
      postgres-proxy: {condition: service_started}
      spire-agent: {condition: service_started}

  # gateway/audit/killswitch/data -> Redpanda over mTLS. Kafka's advertised-listener
  # redirect (a naive TCP tunnel breaks: the broker tells the client to reconnect at its
  # own address, bypassing the proxy) is solved with a dedicated Redpanda `mtls` listener
  # that advertises the client-proxy address (kafka-mtls:29092). Unlike the DB hops, all
  # bus clients share ONE client proxy identity (`kafka-client`): per-client proxies would
  # each need their own advertised listener on the broker — deferred. redpanda-proxy is the
  # server side (terminates mTLS -> redpanda:29093); kafka-mtls is the shared client side.
  redpanda-proxy:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1008:1008"          # `redpanda` bus-server identity
    pid: "service:spire-agent"
    command:
      - server
      - --listen=0.0.0.0:29092
      - --target=redpanda:29093
      - --unsafe-target        # plaintext hop to Redpanda's mtls listener is container-internal
      - --allow-uri=spiffe://ab.internal/kafka-client
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    ports: ["29092:29092"]
    networks: [default, busnet]   # bridges the app network to the isolated busnet
    depends_on:
      redpanda: {condition: service_healthy}
      spire-agent: {condition: service_started}

  kafka-mtls:
    profiles: ["spiffe"]
    image: ghostunnel/ghostunnel:v1.8.2
    user: "1009:1009"          # shared `kafka-client` identity for all bus producers/consumers
    pid: "service:spire-agent"
    command:
      - client
      - --listen=0.0.0.0:29092
      - --unsafe-listen        # plaintext Kafka wire from the app; ghostunnel adds mTLS
      - --target=redpanda-proxy:29092
      - --verify-uri=spiffe://ab.internal/redpanda
      - --use-workload-api-addr=unix:///opt/spire/sockets/agent.sock
    volumes:
      - spire-sockets:/opt/spire/sockets
    depends_on:
      redpanda-proxy: {condition: service_started}
      spire-agent: {condition: service_started}

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Pin the frontend URL so the token `iss` is stable regardless of whether the
      # token was fetched from the host (localhost:18083) or in-container (keycloak:8080).
      KC_HOSTNAME: http://localhost:18083
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    # No healthcheck (the Keycloak image lacks curl/bash for one); dependents use
    # service_started and readiness is polled by `make wait-idp` / the test fixture.
    ports: ["18083:8080"]

  # --- application services (one shared image, per-service command) ---
  identity:
    build: &svc_build
      context: .
      dockerfile: Dockerfile
    image: ab-skeleton-svc
    environment: &svc_env
      AB_PG_DSN: postgresql://ab:ab@postgres:5432/ab
      AB_OPA_URL: http://opa:8181
      AB_KAFKA: redpanda:9092
      AB_VAULT_ADDR: http://vault:8200
      AB_VAULT_TOKEN: root
    command: ["python", "-m", "uvicorn", "ab_identity.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["18001:8000"]
    healthcheck: &svc_health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      postgres: {condition: service_healthy}

  gateway:
    build: *svc_build
    image: ab-skeleton-svc
    environment:
      <<: *svc_env
      AB_OIDC_JWKS_URL: http://keycloak:8080/realms/ab/protocol/openid-connect/certs
    command: ["python", "-m", "uvicorn", "ab_gateway.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["18080:8000"]
    healthcheck: *svc_health
    depends_on:
      opa: {condition: service_healthy}
      redpanda: {condition: service_healthy}
      postgres: {condition: service_healthy}
      keycloak: {condition: service_started}

  killswitch:
    build: *svc_build
    image: ab-skeleton-svc
    environment: *svc_env
    command: ["python", "-m", "uvicorn", "ab_killswitch.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["18002:8000"]
    healthcheck: *svc_health
    depends_on:
      redpanda: {condition: service_healthy}
      postgres: {condition: service_healthy}

  audit:
    build: *svc_build
    image: ab-skeleton-svc
    environment:
      <<: *svc_env
      AB_AUDIT_CONSUMER: "1"
    command: ["python", "-m", "uvicorn", "ab_audit.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["18081:8000"]
    healthcheck: *svc_health
    depends_on:
      redpanda: {condition: service_healthy}
      postgres: {condition: service_healthy}

  agent:
    build: *svc_build
    image: ab-skeleton-svc
    environment:
      <<: *svc_env
      AB_GATEWAY_URL: http://gateway:8000
      AB_OIDC_TOKEN_URL: http://keycloak:8080/realms/ab/protocol/openid-connect/token
    command: ["python", "-m", "uvicorn", "ab_agent.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["18090:8000"]
    healthcheck: *svc_health
    depends_on:
      gateway: {condition: service_healthy}
      keycloak: {condition: service_started}
      vault: {condition: service_healthy}

  # data service (Phase 2): consumes AgentDecisionMade -> warehouse (DuckDB+dbt) and
  # serves canonical KPIs. Uses its own image (Dockerfile.data) with duckdb + dbt.
  data:
    build:
      context: .
      dockerfile: Dockerfile.data
    image: ab-data
    environment:
      AB_KAFKA: redpanda:9092
      AB_WAREHOUSE_DIR: /warehouse
    volumes:
      - data-warehouse:/warehouse
    ports: ["18085:8000"]
    healthcheck: *svc_health
    depends_on:
      redpanda: {condition: service_healthy}

networks:
  pgnet:   # isolated DB network; only postgres + postgres-proxy attach
  busnet:  # isolated bus network; only redpanda + redpanda-proxy attach

volumes:
  spire-sockets:
  data-warehouse:
