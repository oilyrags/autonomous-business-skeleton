name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --frozen
      - name: Lint
        run: |
          uv run ruff check src
          uv run ruff format --check src
      - name: Typecheck
        run: uv run mypy
      - name: Start infra (OPA + Redpanda + Postgres)
        run: docker compose up -d --wait opa redpanda postgres
      - name: Test
        run: uv run pytest
      - name: Stop infra
        if: always()
        run: docker compose down -v
